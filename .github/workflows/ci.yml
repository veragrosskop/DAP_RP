name: CI

on:
  push:
    branches: [ main, dev-ci-tests ]
  workflow_dispatch:

jobs:
  run-on-pi:
    runs-on: self-hosted

    defaults:
      run:
        shell: bash

    env:
      VENV_PATH: ~/.cache/gh-venvs/dap-venv
      PYTHON: python3
      TMPDIR: "/var/tmp"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure venv base directory exists
        run: mkdir -p $(dirname "$VENV_PATH")

      - name: Restore or create virtual environment
        id: venv
        run: |
          if [ -d "$VENV_PATH" ]; then
            echo "Using cached venv at $VENV_PATH"
          else
            echo "Creating new venv at $VENV_PATH"
            $PYTHON -m venv "$VENV_PATH"
            source "$VENV_PATH/bin/activate"
            pip install --upgrade pip

            pip install --cache-dir $TMPDIR .
          fi

      - name: Activate venv and install updated deps (if needed)
        run: |
          source "$VENV_PATH/bin/activate"
          pip install --upgrade pip

          # Optional: reinstall if requirements changed
          if [ -f requirements.txt ]; then
            pip install --cache-dir $TMPDIR .
          fi

      - name: Run script
        run: |
          source "$VENV_PATH/bin/activate"
          python3 main.py