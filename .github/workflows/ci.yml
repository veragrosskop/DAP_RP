name: CI

on:
  push:
    branches: [ main, dev-ci-tests ]
  workflow_dispatch:

jobs:
  run-on-pi:
    runs-on: self-hosted

    defaults:
      run:
        shell: bash

    env:
      VENV_PATH: /var/tmp/.cache/gh-venvs/dap-venv
      PYTHON: python3
      TMPDIR: "/var/tmp"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure venv base directory exists
        run: mkdir -p $(dirname "$VENV_PATH")

      - name: Restore or create virtual environment
        run: |
          if [ -f "$VENV_PATH/bin/python" ]; then
            echo "Using cached venv at $VENV_PATH"
          else
            echo "Creating new venv at $VENV_PATH"
            $PYTHON -m venv "$VENV_PATH"
            source "$VENV_PATH/bin/activate"
            pip install --upgrade pip
            pip install --cache-dir "$TMPDIR" --upgrade .
          fi

      - name: Run script
        run: |
          source "$VENV_PATH/bin/activate"
          nohup python3 main.py > /var/tmp/dap.log 2>&1 &
          disown
          exit 0